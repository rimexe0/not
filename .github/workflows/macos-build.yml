name: macOS Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: macos-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and release (Apple Silicon)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy, rustfmt

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Test Rust
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Compile release binary
        env:
          CARGO_BUILD_JOBS: 1
        run: cargo build --locked --manifest-path src-tauri/Cargo.toml --release --features tauri/custom-protocol

      - name: Build macOS app
        env:
          CARGO_BUILD_JOBS: 1
        run: npm run tauri -- build

      - name: Archive app bundle
        run: tar -czf not-macos-apple-silicon.tar.gz -C src-tauri/target/release/bundle/macos not.app

      - name: Read app version
        id: version
        run: echo "value=$(node -p \"JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version\")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "not-v${{ steps.version.outputs.value }}" \
            "not-macos-apple-silicon.tar.gz#not for Apple Silicon" \
            --target "$GITHUB_SHA" \
            --title "not v${{ steps.version.outputs.value }}" \
            --generate-notes \
            --latest \
            --fail-on-no-commits
